{% extends 'base.html' %}

{% block content %}
<div class="form-card">
    <h1>Giriş Yap</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label>Kullanıcı adı:</label>
            <input type="text" name="username" class="form-input">
        </div>
        <div class="form-group">
            <label>Şifre: </label>
            <input type="text" name="password" class="form-input">
        </div>
        <button type="submit" class="form-button">Giriş yap</button>
    </form>
</div>
{% endblock %}
