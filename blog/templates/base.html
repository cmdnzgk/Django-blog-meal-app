{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Site</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
{% include "navbar.html" %}
{% if messages %}
    {% for message in messages %}
        <div class="message-box">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
<div class="container">
    {% block content %}
    {% endblock %}
</div>
</body>
</html>
